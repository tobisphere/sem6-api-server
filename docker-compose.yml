services:
    fastapi:
        build: app/
        container_name: api-monitizer
        ports:
            - "8080:8080"
        volumes:
            - /mnt/usb-storage/sem6-api-server/uploads:/api/uploads
        restart: unless-stopped
        networks:
            - app-network

    nginx:
        image: nginx:alpine
        container_name: nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - fastapi
        networks:
            - app-network

networks:
    app-network:
        driver: bridge
